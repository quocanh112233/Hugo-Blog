{{ define "main" }}
<header class="page-header">
    <h1>{{ .Title }}</h1>
</header>

<div class="post-content">
    <form id="post-form" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="text" id="post-title" placeholder="Nhập tiêu đề bài viết..." required
            style="padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--entry); color: var(--primary); font-size: 16px;">

        <textarea id="post-content" placeholder="Nội dung bài viết (Hỗ trợ định dạng Markdown)..." rows="12" required
            style="padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--entry); color: var(--primary); font-size: 16px; resize: vertical;"></textarea>

        <button id="submit-btn" type="submit"
            style="padding: 12px; background: var(--primary); color: var(--theme); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px;">
            Đăng Bài
        </button>
    </form>
    <p id="post-message" style="margin-top: 20px; font-weight: bold; text-align: center; line-height: 1.5;"></p>
</div>

<script>
    document.getElementById('post-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const title = document.getElementById('post-title').value;
        const content = document.getElementById('post-content').value;
        const msgEl = document.getElementById('post-message');
        const submitBtn = document.getElementById('submit-btn');

        submitBtn.disabled = true;
        submitBtn.textContent = "Đang xử lý";
        msgEl.textContent = "Đang tải dữ liệu";
        msgEl.style.color = "var(--primary)";

        // kiểm tra session đăng nhập
        const { data: { session } } = await window.supabaseClient.auth.getSession();
        if (!session) {
            msgEl.textContent = "Lỗi: cần đăng nhập để viết bài!";
            msgEl.style.color = "red";
            submitBtn.disabled = false;
            submitBtn.textContent = "Đăng Bài";
            return;
        }

        const user = session.user;
        const userName = user.user_metadata.full_name || user.email;
        const userAvatar = user.user_metadata.avatar_url || '';

        // trả dữ liệu vào bảng posts
        const { error } = await window.supabaseClient
            .from('posts')
            .insert([{
                title: title,
                content: content,
                author_id: user.id,
                author_name: userName,
                author_avatar: userAvatar
            }]);

        if (error) {
            msgEl.textContent = "Lỗi: " + error.message;
            msgEl.style.color = "red";
            submitBtn.disabled = false;
            submitBtn.textContent = "Đăng Bài";
        } else {
            document.getElementById('post-form').style.display = 'none';

            msgEl.innerHTML = `
                <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; padding: 30px; border-radius: 8px; text-align: center;">
                    <h2 style="color: #10b981; margin-top: 0; font-size: 24px;">Xuất bản thành công!</h2>
                    <p style="color: var(--primary); font-size: 16px; margin-bottom: 20px;">Bài viết đã được lưu an toàn. Cloudflare đang tự động chạy nền để cập nhật trang chủ (sẽ mất khoảng 1-2 phút).</p>
                    <p style="color: var(--secondary); font-size: 14px;">Tự động quay về trang chủ sau <strong id="countdown" style="color: var(--primary);">5</strong> giây...</p>
                </div>
            `;

            let timeLeft = 5;
            const countdownEl = document.getElementById('countdown');
            const timer = setInterval(() => {
                timeLeft -= 1;
                countdownEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    window.location.href = "/";
                }
            }, 1000);
        }
    });
</script>
{{ end }}
